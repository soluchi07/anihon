name: Deploy App

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_BASE: ${{ secrets.API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          aws s3 cp frontend/build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deploy Lambda functions
        run: |
          LAMBDAS="auth onboarding recommendation-api recommendation-worker anime-getter interactions"
          for fn in $LAMBDAS; do
            SRC_MAP="auth:backend/lambdas/auth/handler.py \
                     onboarding:backend/lambdas/onboarding/handler.py \
                     recommendation-api:backend/lambdas/recommendation/handler.py \
                     recommendation-worker:backend/lambdas/recommendation_worker/handler.py \
                     anime-getter:backend/lambdas/anime_getter/handler.py \
                     interactions:backend/lambdas/interactions/handler.py"
          done

          # Package and update each Lambda
          for entry in $SRC_MAP; do
            NAME="${entry%%:*}"
            SRC="${entry##*:}"
            zip -j /tmp/${NAME}.zip ${SRC}
            aws lambda update-function-code \
              --function-name ${{ secrets.PROJECT_NAME }}-${NAME} \
              --zip-file fileb:///tmp/${NAME}.zip
          done
