name: Deploy App

on:
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_BASE: ${{ secrets.API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Package Lambda artifacts
        run: bash scripts/package_lambdas.sh

      - name: Validate Lambda artifacts
        run: |
          set -euo pipefail
          EXPECTED=(
            auth.zip
            onboarding.zip
            recommendation.zip
            recommendation_worker.zip
            anime_getter.zip
            interactions.zip
            lists.zip
            data_ingest.zip
          )
          for artifact in "${EXPECTED[@]}"; do
            test -f "build/lambdas/${artifact}"
          done

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          aws s3 cp frontend/build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deploy Lambda functions
        run: |
          set -euo pipefail
          declare -A ZIP_MAP=(
            [auth]="auth.zip"
            [onboarding]="onboarding.zip"
            [recommendation-api]="recommendation.zip"
            [recommendation-worker]="recommendation_worker.zip"
            [anime-getter]="anime_getter.zip"
            [interactions]="interactions.zip"
            [lists]="lists.zip"
            [data-ingest]="data_ingest.zip"
          )

          for NAME in "${!ZIP_MAP[@]}"; do
            ZIP_FILE="build/lambdas/${ZIP_MAP[$NAME]}"
            aws lambda update-function-code \
              --function-name ${{ secrets.PROJECT_NAME }}-${NAME} \
              --zip-file "fileb://${ZIP_FILE}"
          done

      - name: Verify Lambda deployment status
        run: |
          set -euo pipefail
          FUNCTIONS=(
            auth
            onboarding
            recommendation-api
            recommendation-worker
            anime-getter
            interactions
            lists
            data-ingest
          )

          for NAME in "${FUNCTIONS[@]}"; do
            FN="${{ secrets.PROJECT_NAME }}-${NAME}"
            aws lambda wait function-updated --function-name "$FN"
            STATUS=$(aws lambda get-function-configuration --function-name "$FN" --query 'LastUpdateStatus' --output text)
            test "$STATUS" = "Successful"
          done

      - name: Verify CloudFront serves app
        run: |
          set -euo pipefail
          DIST_DOMAIN=$(aws cloudfront get-distribution \
            --id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --query 'Distribution.DomainName' \
            --output text)
          curl --fail --silent --show-error "https://${DIST_DOMAIN}/" >/dev/null
