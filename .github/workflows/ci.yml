name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run backend tests
        run: pytest -q backend

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend unit tests
        working-directory: frontend
        env:
          CI: "true"
        run: npm test -- --watch=false --passWithNoTests

  lambda-packaging-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package Lambda artifacts
        run: bash scripts/package_lambdas.sh
      - name: Validate packaged artifacts
        run: |
          test -d build/lambdas
          test "$(find build/lambdas -maxdepth 1 -type f -name '*.zip' | wc -l)" -ge 8

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps
      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          E2E_TESTS: "1"
          E2E_BASE_URL: "http://localhost:3001"
          CI: "true"
          PORT: "3001"
        run: npm run test:e2e

  live-integration-chain:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    if: vars.RUN_LIVE_INTEGRATION == '1' && vars.API_BASE_URL != ''
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend integration test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run live integration chain test
        env:
          INTEGRATION_TESTS: "1"
          API_BASE: ${{ vars.API_BASE_URL }}
        run: pytest -q backend/tests/integration/test_live_auth_flow.py
