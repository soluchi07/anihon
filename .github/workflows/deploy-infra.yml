name: Deploy Infrastructure

on:
  workflow_dispatch:

concurrency:
  group: deploy-infra
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.4.0
      - name: Terraform Init
        run: terraform -chdir=infrastructure/terraform init
      - name: Terraform Format Check
        run: terraform -chdir=infrastructure/terraform fmt -check -recursive
      - name: Terraform Validate
        run: terraform -chdir=infrastructure/terraform validate
      - name: Terraform Plan
        run: terraform -chdir=infrastructure/terraform plan -out=tfplan -var-file=envs/dev.tfvars
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-plan
          path: infrastructure/terraform/tfplan

  apply:
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.4.0
      - name: Terraform Init
        run: terraform -chdir=infrastructure/terraform init
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-plan
          path: infrastructure/terraform
      - name: Terraform Apply
        run: terraform -chdir=infrastructure/terraform apply -auto-approve tfplan
