name: Deploy Infrastructure

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0
      - name: Terraform Init
        run: terraform -chdir=infrastructure/terraform init
      - name: Terraform Plan
        run: terraform -chdir=infrastructure/terraform plan -var-file=infrastructure/terraform/envs/dev.tfvars
      # Apply will be manually run or gated by approval in protected branches
